    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --border: rgba(15, 23, 42, 0.12);
      }

      html, body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(15, 118, 110, 0.10), transparent 28%),
          linear-gradient(180deg, #fffdf8 0%, var(--bg) 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #preview-root {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .preview-card {
        width: min(560px, 100%);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
        padding: 28px;
        text-align: center;
        backdrop-filter: blur(10px);
      }

      .preview-title {
        margin: 0 0 8px;
        font-size: 1.4rem;
        font-weight: 700;
      }

      .preview-copy {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .spinner {
        width: 42px;
        height: 42px;
        margin: 0 auto 18px;
        border-radius: 999px;
        border: 4px solid rgba(15, 118, 110, 0.15);
        border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
      }

      .error-box {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(220, 38, 38, 0.08);
        color: #991b1b;
        text-align: left;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
