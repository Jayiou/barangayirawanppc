<template>
    <div class="page-shell">
        <section v-if="!isAuthenticated" class="login-shell">
            <article class="login-panel">
                <BrandMark initials="BA" eyebrow="Restricted Entry" title="Barangay Connect Admin" :admin="true" />
                <div class="status-box" :style="{ color: loginError ? '#8f3814' : '' }">{{ loginStatus }}</div>
                <form class="stack" @submit.prevent="loginAdmin">
                    <label><span>Username</span><input v-model="loginForm.username" type="text" required></label>
                    <label><span>Password</span><input v-model="loginForm.password" type="password" required></label>
                    <button type="submit" class="primary-button">Enter Admin Portal</button>
                </form>
            </article>
        </section>

        <div v-else class="app-shell">
            <aside class="app-sidebar">
                <BrandMark initials="BA" eyebrow="Admin Portal" title="Barangay Connect" :admin="true" />
                <div class="sidebar-block">
                    <strong>{{ user?.username }}</strong>
                    <div class="fine-print">{{ user?.email }}</div>
                </div>
                <button type="button" class="ghost-button" @click="logout">Log Out</button>
            </aside>

            <main class="app-main">
                <section class="hero-banner">
                    <div>
                        <span class="eyebrow">Operations</span>
                        <h2>Admin approvals and records overview</h2>
                    </div>
                    <div class="status-box" :style="{ color: dashboardError ? '#8f3814' : '' }">{{ dashboardStatus }}</div>
                </section>

                <div class="summary-grid">
                    <article class="summary-card"><span>Residents</span><strong>{{ residents.length }}</strong></article>
                    <article class="summary-card"><span>Officials</span><strong>{{ officials.length }}</strong></article>
                    <article class="summary-card"><span>Appointments</span><strong>{{ appointments.length }}</strong></article>
                    <article class="summary-card"><span>Requests</span><strong>{{ documentRequests.length }}</strong></article>
                    <article class="summary-card"><span>Reservations</span><strong>{{ reservations.length }}</strong></article>
                    <article class="summary-card"><span>Reports</span><strong>{{ reports.length }}</strong></article>
                </div>

                <div class="portal-grid two-up">
                    <article class="content-card">
                        <div class="section-head"><span class="eyebrow">Officials</span><h3>Create and monitor officials</h3></div>
                        <form class="stack" @submit.prevent="createOfficial">
                            <label><span>Full name</span><input v-model="officialForm.fullName" type="text" required></label>
                            <label><span>Position</span><input v-model="officialForm.position" type="text" required></label>
                            <label><span>Contact number</span><input v-model="officialForm.contactNumber" type="text"></label>
                            <label><span>Email</span><input v-model="officialForm.email" type="email"></label>
                            <label><span>Office days</span><input v-model="officialForm.officeDays" type="text" placeholder="Mon,Tue,Wed"></label>
                            <label><span>Office start</span><input v-model="officialForm.officeStartTime" type="time"></label>
                            <label><span>Office end</span><input v-model="officialForm.officeEndTime" type="time"></label>
                            <label><span>Office location</span><input v-model="officialForm.officeLocation" type="text"></label>
                            <button type="submit" class="primary-button">Create Official</button>
                        </form>
                    </article>

                    <article class="content-card">
                        <div class="section-head"><span class="eyebrow">Resident Records</span><h3>Search residents and officials</h3></div>
                        
                        <!-- NEW: Pending Approvals -->
                        <div v-if="pendingResidents.length > 0" style="margin-bottom: 24px; padding: 16px; border: 1px solid var(--accent); border-radius: var(--radius-md); background: #fffdfa;">
                            <h4 style="color: var(--accent-deep); margin-bottom: 12px; font-family: 'Manrope', sans-serif;">Requires Action ({{ pendingResidents.length }})</h4>
                            <div v-for="person in pendingResidents" :key="person._id" class="record-item" style="border-color: rgba(186, 91, 42, 0.2);">
                                <div class="record-title">{{ person.firstName }} {{ person.lastName }} <StatusBadge status="pending" /></div>
                                <div class="record-meta">{{ person.address }}, {{ person.purok }} | Age: {{ calculateAge(person.birthDate) }}</div>
                                <div class="record-meta" style="margin-top: 4px;">
                                    <a :href="`/uploads/${person.proofOfResidency}`" target="_blank" style="color: var(--blue); text-decoration: underline; font-size: 13px;">View Attached ID/Proof</a>
                                </div>
                                <div class="inline-form-row" style="margin-top: 12px;">
                                    <button type="button" class="primary-button" style="background: var(--green); padding: 8px 16px;" @click="updateResidentStatus(person._id, 'approved')">Approve Resident</button>
                                    <button type="button" class="ghost-button" style="color: var(--accent-deep);" @click="updateResidentStatus(person._id, 'rejected')">Reject</button>
                                </div>
                            </div>
                        </div>

                        <div class="toolbar"><input v-model="officialSearch" type="search" placeholder="Search officials"></div>
                        <RecordList :items="filteredOfficialItems" />
                        <div class="toolbar"><input v-model="residentSearch" type="search" placeholder="Search approved residents"></div>
                        <RecordList :items="filteredResidentItems" />
                    </article>
                </div>

                <div class="portal-grid two-up">
                    <article class="content-card">
                        <div class="section-head"><span class="eyebrow">Appointments</span><h3>Manage booking requests</h3></div>
                        <div class="toolbar"><select v-model="appointmentFilter"><option value="">All statuses</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option><option value="rescheduled">Rescheduled</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></div>
                        <div class="record-list">
                            <div v-for="item in filteredAppointments" :key="item._id" class="record-item">
                                <div class="record-title">{{ item.purpose }} <StatusBadge :status="item.status" /></div>
                                <div class="record-meta">{{ item.residentId?.firstName }} {{ item.residentId?.lastName }} | {{ formatDate(item.appointmentDate) }} | {{ item.timeSlot }}</div>
                                <form class="inline-form" @submit.prevent="updateStatus('/appointments', item)">
                                    <div class="inline-form-row">
                                        <select v-model="item.status"><option value="pending">pending</option><option value="approved">approved</option><option value="rejected">rejected</option><option value="rescheduled">rescheduled</option><option value="completed">completed</option><option value="cancelled">cancelled</option></select>
                                        <input v-model="item.adminNotes" type="text" placeholder="Admin notes">
                                        <button type="submit" class="primary-button">Update</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </article>

                    <article class="content-card">
                        <div class="section-head"><span class="eyebrow">Documents</span><h3>Manage document requests</h3></div>
                        <div class="toolbar"><select v-model="documentFilter"><option value="">All statuses</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option><option value="ready_for_pickup">Ready for Pickup</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></div>
                        <div class="record-list">
                            <div v-for="item in filteredDocumentRequests" :key="item._id" class="record-item">
                                <div class="record-title">{{ item.documentType }} <StatusBadge :status="item.status" /></div>
                                <div class="record-meta">{{ item.residentId?.firstName }} {{ item.residentId?.lastName }} | {{ item.purpose }}</div>
                                <form class="inline-form" @submit.prevent="updateStatus('/document-requests', item)">
                                    <div class="inline-form-row">
                                        <select v-model="item.status"><option value="pending">pending</option><option value="approved">approved</option><option value="rejected">rejected</option><option value="ready_for_pickup">ready_for_pickup</option><option value="completed">completed</option><option value="cancelled">cancelled</option></select>
                                        <input v-model="item.adminNotes" type="text" placeholder="Admin notes">
                                        <button type="submit" class="primary-button">Update</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </article>
                </div>

                <div class="portal-grid two-up">
                    <article class="content-card">
                        <div class="section-head"><span class="eyebrow">Reservations</span><h3>Manage facility requests</h3></div>
                        <div class="toolbar"><select v-model="reservationFilter"><option value="">All statuses</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option><option value="rescheduled">Rescheduled</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></div>
                        <div class="record-list">
                            <div v-for="item in filteredReservations" :key="item._id" class="record-item">
                                <div class="record-title">{{ item.facilityName }} <StatusBadge :status="item.status" /></div>
                                <div class="record-meta">{{ item.residentId?.firstName }} {{ item.residentId?.lastName }} | {{ formatDate(item.reservationDate) }} | {{ item.startTime }}-{{ item.endTime }}</div>
                                <form class="inline-form" @submit.prevent="updateStatus('/facility-reservations', item)">
                                    <div class="inline-form-row">
                                        <select v-model="item.status"><option value="pending">pending</option><option value="approved">approved</option><option value="rejected">rejected</option><option value="rescheduled">rescheduled</option><option value="completed">completed</option><option value="cancelled">cancelled</option></select>
                                        <input v-model="item.adminNotes" type="text" placeholder="Admin notes">
                                        <button type="submit" class="primary-button">Update</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </article>

                    <article class="content-card">
                        <div class="section-head"><span class="eyebrow">Reports</span><h3>Manage resident reports</h3></div>
                        <div class="toolbar"><select v-model="reportFilter"><option value="">All statuses</option><option value="pending">Pending</option><option value="reviewing">Reviewing</option><option value="in_progress">In Progress</option><option value="resolved">Resolved</option><option value="rejected">Rejected</option><option value="closed">Closed</option></select></div>
                        <div class="record-list">
                            <div v-for="item in filteredReports" :key="item._id" class="record-item">
                                <div class="record-title">{{ item.title }} <StatusBadge :status="item.status" /></div>
                                <div class="record-meta">{{ item.residentId?.firstName }} {{ item.residentId?.lastName }} | {{ item.priority }} | {{ item.locationText }}</div>
                                <form class="inline-form" @submit.prevent="updateStatus('/reports', item)">
                                    <div class="inline-form-row">
                                        <select v-model="item.status"><option value="pending">pending</option><option value="reviewing">reviewing</option><option value="in_progress">in_progress</option><option value="resolved">resolved</option><option value="rejected">rejected</option><option value="closed">closed</option></select>
                                        <input v-model="item.adminNotes" type="text" placeholder="Admin notes">
                                        <button type="submit" class="primary-button">Update</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </article>
                </div>
            </main>
        </div>
    </div>
</template>

<script setup>
import { computed, onMounted, reactive, ref } from 'vue';
import BrandMark from '@/components/BrandMark.vue';
import RecordList from '@/components/RecordList.vue';
import StatusBadge from '@/components/StatusBadge.vue';
import { apiFetch, clearAuth, formatDate, getAuth, normalizeText, setAuth } from '@/shared/client';

const loginForm = reactive({ username: '', password: '' });
const officialForm = reactive({ fullName: '', position: '', contactNumber: '', email: '', officeDays: '', officeStartTime: '', officeEndTime: '', officeLocation: '' });

const loginStatus = ref('Admin login required.');
const loginError = ref(false);
const dashboardStatus = ref('Checking admin session.');
const dashboardError = ref(false);
const user = ref(null);
const isAuthenticated = ref(false);

const officials = ref([]);
const residents = ref([]);
const appointments = ref([]);
const documentRequests = ref([]);
const reservations = ref([]);
const reports = ref([]);

const officialSearch = ref('');
const residentSearch = ref('');
const appointmentFilter = ref('');
const documentFilter = ref('');
const reservationFilter = ref('');
const reportFilter = ref('');

const filteredOfficialItems = computed(() => officials.value
    .filter((item) => !officialSearch.value || normalizeText(`${item.fullName} ${item.position} ${item.officeLocation} ${item.availabilityStatus}`).includes(normalizeText(officialSearch.value)))
    .map((item) => ({ id: item._id, title: item.fullName, status: item.availabilityStatus, meta: `${item.position} | ${item.officeLocation || 'No office location'}` })));

const filteredResidentItems = computed(() => residents.value
    .filter((item) => item.userId?.accountStatus === 'approved')
    .filter((item) => !residentSearch.value || normalizeText(`${item.firstName} ${item.lastName} ${item.address} ${item.userId?.username || ''}`).includes(normalizeText(residentSearch.value)))
    .map((item) => ({ id: item._id, title: `${item.firstName} ${item.lastName}`, meta: `${item.address} | User: ${item.userId?.username || 'Unknown'}` })));

const pendingResidents = computed(() => residents.value.filter((item) => item.userId?.accountStatus === 'pending_approval'));

const calculateAge = (birthDateString) => {
    const today = new Date();
    const birthDate = new Date(birthDateString);
    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
        age--;
    }
    return age;
};

const updateResidentStatus = async (id, status) => {
    try {
        await apiFetch(`/residents/${id}/status`, {
            method: 'PATCH',
            body: JSON.stringify({ status })
        });
        await loadAll();
        setDashboardMessage(`Resident account successfully ${status}.`);
    } catch (error) {
        setDashboardMessage(error.message, true);
    }
};

const filteredAppointments = computed(() => appointments.value.filter((item) => !appointmentFilter.value || item.status === appointmentFilter.value));
const filteredDocumentRequests = computed(() => documentRequests.value.filter((item) => !documentFilter.value || item.status === documentFilter.value));
const filteredReservations = computed(() => reservations.value.filter((item) => !reservationFilter.value || item.status === reservationFilter.value));
const filteredReports = computed(() => reports.value.filter((item) => !reportFilter.value || item.status === reportFilter.value));

const setLoginMessage = (message, isError = false) => {
    loginStatus.value = message;
    loginError.value = isError;
};

const setDashboardMessage = (message, isError = false) => {
    dashboardStatus.value = message;
    dashboardError.value = isError;
};

const resetOfficialForm = () => {
    Object.assign(officialForm, { fullName: '', position: '', contactNumber: '', email: '', officeDays: '', officeStartTime: '', officeEndTime: '', officeLocation: '' });
};

const ensureAdmin = async () => {
    const auth = getAuth();

    if (!auth.token) {
        return false;
    }

    try {
        const me = await apiFetch('/auth/me');

        if (me.role !== 'admin') {
            clearAuth();
            return false;
        }

        user.value = me;
        isAuthenticated.value = true;
        return true;
    } catch {
        clearAuth();
        return false;
    }
};

const loginAdmin = async () => {
    try {
        const response = await apiFetch('/auth/login', {
            method: 'POST',
            body: JSON.stringify(loginForm)
        });

        if (response.user.role !== 'admin') {
            clearAuth();
            setLoginMessage('This entry page is for admin accounts only.', true);
            return;
        }

        setAuth(response.token, response.user);
        user.value = response.user;
        isAuthenticated.value = true;
        await loadAll();
        setDashboardMessage('Admin portal loaded.');
    } catch (error) {
        setLoginMessage(error.message, true);
    }
};

const loadAll = async () => {
    try {
        [officials.value, residents.value, appointments.value, documentRequests.value, reservations.value, reports.value] = await Promise.all([
            apiFetch('/officials'),
            apiFetch('/residents'),
            apiFetch('/appointments'),
            apiFetch('/document-requests'),
            apiFetch('/facility-reservations'),
            apiFetch('/reports')
        ]);
    } catch (error) {
        setDashboardMessage(error.message, true);
    }
};

const createOfficial = async () => {
    try {
        const payload = {
            ...officialForm,
            officeDays: officialForm.officeDays
                ? officialForm.officeDays.split(',').map((day) => day.trim()).filter(Boolean)
                : []
        };

        await apiFetch('/officials', { method: 'POST', body: JSON.stringify(payload) });
        resetOfficialForm();
        await loadAll();
        setDashboardMessage('Official created.');
    } catch (error) {
        setDashboardMessage(error.message, true);
    }
};

const updateStatus = async (basePath, item) => {
    try {
        await apiFetch(`${basePath}/${item._id}/status`, {
            method: 'PATCH',
            body: JSON.stringify({ status: item.status, adminNotes: item.adminNotes || '' })
        });

        await loadAll();
        setDashboardMessage('Status updated.');
    } catch (error) {
        setDashboardMessage(error.message, true);
    }
};

const logout = () => {
    clearAuth();
    isAuthenticated.value = false;
    setLoginMessage('Admin login required.');
};

onMounted(async () => {
    const allowed = await ensureAdmin();

    if (!allowed) {
        return;
    }

    await loadAll();
    setDashboardMessage('Admin portal loaded.');
});
</script>
